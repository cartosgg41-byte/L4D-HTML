<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie FPS Game</title>
    <script src="https://threejs.org/build/three.js"></script>
    
    <style>
        body { margin: 0; }
        canvas { display: block; }
        #hud { position: absolute; top: 20px; left: 20px; color: white; }
    </style>
</head>
<body>
    <div id="hud">
        <div>Health: <span id="health">100</span></div>
        <div>Weapon: <span id="weapon">Pistol</span></div>
    </div>
    <script>
        // Initialization code
        let scene, camera, renderer, health, weapon;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Add lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            scene.add(ambientLight);
            scene.add(pointLight);

            // Add atmospheric fog
            scene.fog = new THREE.Fog(0xffffff, 0, 750);

            // Load detailed models
            loadModels();

            // Camera controls
            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === document.body) {
                    // Pointer locked - control camera
                    document.addEventListener('mousemove', onPointerMove);
                }
            });

            camera.position.z = 5;
            animate();
        }

        function loadModels() {
            // Load zombie models and props like buildings and barrels
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function onPointerMove(event) {
            // Handle camera movements based on mouse position
        }

        init();
    </script>
</body>
</html>
