<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L4D Style Zombie FPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100%; height: 100vh; }
        canvas { display: block; }
        #hud { position: absolute; color: #00ff00; font-family: Arial; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #health { top: 20px; left: 20px; font-size: 18px; }
        #ammo { top: 70px; left: 20px; font-size: 18px; color: #ffff00; }
        #wave { top: 20px; right: 20px; font-size: 18px; }
        #kills { top: 70px; right: 20px; font-size: 18px; color: #00ccff; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 2px solid #00ff00; border-radius: 50%; }
        #crosshairDot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; background: #00ff00; border-radius: 50%; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 40px; border: 3px solid #ff0000; text-align: center; color: #00ff00; display: none; z-index: 100; }
        #gameOverText { font-size: 48px; margin-bottom: 20px; }
        #gameOverStats { font-size: 20px; margin-bottom: 20px; }
        #restartBtn { background: #00ff00; color: #000; border: none; padding: 10px 30px; font-size: 18px; cursor: pointer; font-weight: bold; }
        #restartBtn:hover { background: #00cc00; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="health">Health: 100</div>
        <div id="ammo">Ammo: 30/120</div>
        <div id="wave">Wave: 1</div>
        <div id="kills">Kills: 0</div>
    </div>
    <div id="crosshair"><div id="crosshairDot"></div></div>
    <div id="gameOver">
        <div id="gameOverText">GAME OVER</div>
        <div id="gameOverStats"></div>
        <button id="restartBtn">Restart</button>
    </div>
    
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6;
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(50, 50, 50);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        
        // Ground
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(300, 300),
            new THREE.MeshLambertMaterial({color: 0x4a7c3a})
        );
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Walls
        [
            {x:0, z:150, w:300, h:20},
            {x:0, z:-150, w:300, h:20},
            {x:150, z:0, w:20, h:300},
            {x:-150, z:0, w:20, h:300}
        ].forEach(w => {
            const wall = new THREE.Mesh(
                new THREE.BoxGeometry(w.w, w.h, 1),
                new THREE.MeshLambertMaterial({color: 0x8b4513})
            );
            wall.position.set(w.x, 10, w.z);
            wall.castShadow = true;
            scene.add(wall);
        });
        
        // Game State
        let player = {
            health: 100,
            ammo: 30,
            maxAmmo: 30,
            totalAmmo: 120,
            weapon: 0,
            fireRate: 0
        };
        let zombies = [];
        let bullets = [];
        let wave = 1;
        let kills = 0;
        let gameOver = false;
        let spawnedZombies = 0;
        let frameCount = 0;
        const keys = {};
        let mouseX = 0, mouseY = 0;
        
        // Input
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') {
                e.preventDefault();
                if (!gameOver && player.totalAmmo > 0) {
                    player.ammo = Math.min(30, player.ammo + 20);
                    player.totalAmmo -= 20;
                }
            }
            if (e.key === 'q') player.weapon = (player.weapon + 1) % 3;
        });
        document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        document.addEventListener('mousemove', e => {
            mouseX = (e.clientX/window.innerWidth)*2-1;
            mouseY = -(e.clientY/window.innerHeight)*2+1;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = Math.atan2(mouseX, 1);
            camera.rotation.x = Math.asin(Math.max(-1, Math.min(1, mouseY*0.5)));
        });
        document.addEventListener('click', () => {
            if (!gameOver && player.ammo > 0 && player.fireRate <= 0) {
                player.ammo--;
                player.fireRate = 8;
                const b = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({color: 0xffff00}));
                b.position.copy(camera.position);
                b.dir = new THREE.Vector3(0, mouseY*0.3, -1).normalize();
                b.life = 300;
                scene.add(b);
                bullets.push(b);
            }
        });
        
        class Zombie {
            constructor(x, z) {
                this.health = 3;
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.4), new THREE.MeshLambertMaterial({color: 0x5a7a3a}));
                body.position.y = 0.9;
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshLambertMaterial({color: 0x6a8a4a}));
                head.position.y = 2.2;
                this.mesh = new THREE.Group();
                this.mesh.add(body);
                this.mesh.add(head);
                this.mesh.position.set(x, 0, z);
                this.mesh.castShadow = true;
                scene.add(this.mesh);
            }
            update(playerPos) {
                const d = new THREE.Vector3().subVectors(playerPos, this.mesh.position).normalize();
                const dist = this.mesh.position.distanceTo(playerPos);
                if (dist > 3) this.mesh.position.addScaledVector(d, 0.08);
                this.mesh.rotation.y = Math.atan2(d.x, d.z);
                return dist;
            }
        }
        
        function updateGame() {
            if (gameOver) return;
            
            // Movement
            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camera.rotation.y);
            const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camera.rotation.y);
            const speed = keys['shift'] ? 0.5 : 0.3;
            
            if (keys['w']) camera.position.addScaledVector(forward, speed);
            if (keys['s']) camera.position.addScaledVector(forward, -speed);
            if (keys['a']) camera.position.addScaledVector(right, -speed);
            if (keys['d']) camera.position.addScaledVector(right, speed);
            
            camera.position.x = Math.max(-140, Math.min(140, camera.position.x));
            camera.position.z = Math.max(-140, Math.min(140, camera.position.z));
            
            if (player.fireRate > 0) player.fireRate--;
            
            // Spawn zombies
            if (spawnedZombies < 5+wave*2 && frameCount%50===0) {
                const angle = Math.random()*Math.PI*2;
                zombies.push(new Zombie(camera.position.x+Math.cos(angle)*60, camera.position.z+Math.sin(angle)*60));
                spawnedZombies++;
            }
            
            // Update zombies
            zombies.forEach((z, i) => {
                const dist = z.update(camera.position);
                if (dist < 2) {
                    player.health -= 0.5;
                    if (player.health <= 0) gameOver = true;
                }
            });
            
            // Update bullets
            bullets.forEach((b, i) => {
                b.position.addScaledVector(b.dir, 1);
                b.life--;
                if (b.life <= 0) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                    return;
                }
                zombies.forEach((z, j) => {
                    if (b.position.distanceTo(z.mesh.position) < 1.5) {
                        z.health--;
                        if (z.health <= 0) {
                            scene.remove(z.mesh);
                            zombies.splice(j, 1);
                            kills++;
                        }
                        scene.remove(b);
                        bullets.splice(i, 1);
                    }
                });
            });
            
            // Wave check
            if (zombies.length === 0 && spawnedZombies >= 5+wave*2) {
                wave++;
                spawnedZombies = 0;
            }
            
            // HUD
            document.getElementById('health').textContent = `Health: ${Math.floor(player.health)}`;
            document.getElementById('ammo').textContent = `Ammo: ${player.ammo}/${player.totalAmmo}`;
            document.getElementById('wave').textContent = `Wave: ${wave}`;
            document.getElementById('kills').textContent = `Kills: ${kills}`;
            
            if (gameOver) {
                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('gameOverStats').innerHTML = `Wave: ${wave-1}<br>Kills: ${kills}`;
            }
        }
        
        document.getElementById('restartBtn').addEventListener('click', () => location.reload());
        
        function animate() {
            requestAnimationFrame(animate);
            frameCount++;
            updateGame();
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
